services:
  - type: web
    name: secureanswer-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: "production"
      - key: CORS_ORIGINS
        value: "https://secure-answer.vercel.app,https://secure-answer-47bfks0zk-shriyanshs-projects-6d2f0600.vercel.app,https://secure-answer-shriyanshs-projects-6d2f0600.vercel.app"
      - key: SUPABASE_URL
        value: ""
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: ""
